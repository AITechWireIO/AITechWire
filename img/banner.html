<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; background: #0a0a0f; overflow: hidden; }
</style>
</head>
<body>
<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f0b429" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#f0b429" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd96a"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c6cf5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c6cf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect width="1500" height="500" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1050" y1="0" x2="1050" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1350" y1="0" x2="1350" y2="500"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1500" height="3" fill="url(#lineGrad)"/>
  <!-- Accent line bottom -->
  <rect x="0" y="497" width="1500" height="3" fill="url(#lineGrad)"/>

  <!-- Left side: Lightning bolt icon -->
  <g transform="translate(110, 140)">
    <polygon
      points="55,0 20,120 48,120 30,230 90,80 55,80 72,0"
      fill="url(#boltGrad)"
      stroke="#ffd96a"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
  </g>

  <!-- Main title -->
  <text x="240" y="240"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="96"
    font-weight="900"
    fill="#f0f0f5"
    letter-spacing="-3">
    AI <tspan fill="#f0b429">TechWire</tspan>
  </text>

  <!-- Tagline -->
  <text x="242" y="295"
    font-family="Arial, sans-serif"
    font-size="26"
    fill="#ffffff"
    fill-opacity="0.5"
    letter-spacing="6">
    WHERE AI MEETS MONEY
  </text>

  <!-- Divider -->
  <rect x="242" y="318" width="520" height="2" fill="#f0b429" fill-opacity="0.4" rx="1"/>

  <!-- Subtitle topics -->
  <text x="242" y="360"
    font-family="Arial, sans-serif"
    font-size="18"
    fill="#9999b0"
    letter-spacing="1">
    AI &amp; Tech  ·  Finance  ·  Crypto  ·  Real Estate
  </text>

  <!-- Right side: decorative data viz -->
  <!-- Chart bars -->
  <g transform="translate(980, 120)" opacity="0.6">
    <rect x="0" y="220" width="30" height="40" fill="#7c6cf5" rx="4" opacity="0.7"/>
    <rect x="45" y="170" width="30" height="90" fill="#7c6cf5" rx="4" opacity="0.8"/>
    <rect x="90" y="120" width="30" height="140" fill="#f0b429" rx="4"/>
    <rect x="135" y="80" width="30" height="180" fill="#f0b429" rx="4"/>
    <rect x="180" y="50" width="30" height="210" fill="#38d9a9" rx="4"/>
    <rect x="225" y="90" width="30" height="170" fill="#38d9a9" rx="4" opacity="0.8"/>
    <rect x="270" y="140" width="30" height="120" fill="#f0b429" rx="4" opacity="0.7"/>
    <rect x="315" y="60" width="30" height="200" fill="#f0b429" rx="4"/>
    <!-- Base line -->
    <rect x="0" y="260" width="345" height="2" fill="#ffffff" fill-opacity="0.1"/>
  </g>

  <!-- Right side circuit dots -->
  <g fill="#f0b429" fill-opacity="0.2">
    <circle cx="1350" cy="80" r="4"/>
    <circle cx="1380" cy="80" r="4"/>
    <circle cx="1410" cy="80" r="4"/>
    <circle cx="1440" cy="80" r="4"/>
    <circle cx="1350" cy="110" r="4"/>
    <circle cx="1380" cy="110" r="4"/>
    <circle cx="1410" cy="110" r="4"/>
    <circle cx="1440" cy="110" r="4"/>
    <circle cx="1470" cy="80" r="4"/>
    <circle cx="1470" cy="110" r="4"/>
  </g>

  <!-- Bottom: website + handle -->
  <text x="242" y="435"
    font-family="Arial, sans-serif"
    font-size="18"
    fill="#f0b429"
    fill-opacity="0.7"
    letter-spacing="1">
    aitechwire.io  ·  @AITechWireIO
  </text>
</svg>
</body>
</html>
