<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px; height: 400px;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Arial Black', Arial, sans-serif;
  }
</style>
</head>
<body>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0b429" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd96a"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Glow circle behind bolt -->
  <circle cx="200" cy="185" r="120" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#f0b429" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#f0b429" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Lightning bolt — centered, bold -->
  <polygon
    points="220,60 150,210 195,210 175,345 265,175 215,175 240,60"
    fill="url(#boltGrad)"
    stroke="#ffd96a"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Bottom text: AI TECHWIRE -->
  <text x="200" y="360"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="24"
    font-weight="900"
    fill="#f0b429"
    text-anchor="middle"
    letter-spacing="4">
    AI TECHWIRE
  </text>

  <!-- Tagline -->
  <text x="200" y="382"
    font-family="Arial, sans-serif"
    font-size="11"
    fill="#ffffff"
    fill-opacity="0.4"
    text-anchor="middle"
    letter-spacing="2">
    WHERE AI MEETS MONEY
  </text>
</svg>
</body>
</html>
